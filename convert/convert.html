<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер валют</title>
    <link rel="stylesheet" href="convert.css">
</head>
<body>
    <div class="container">
        <h1>Конвертер валют</h1>
        
        <div class="input-group">
            <label for="amount">Сумма:</label>
            <input type="number" id="amount" placeholder="Введите сумму">
            <div class="error" id="amountError">Введите сумму</div>
        </div>
        <div class="input-group">
            <label for="currency">Валюта:</label>
            <select id="currency">
                <option value="USD">Доллар США (USD)</option>
                <option value="EUR">Евро (EUR)</option>
                <option value="GBP">Фунт стерлингов (GBP)</option>
                <option value="CNY">Китайский юань (CNY)</option>
                <option value="JPY">Японская иена (JPY)</option>
            </select>
        </div>

        <button id="convertBtn">Конвертировать</button>

        <div class="result" id="result">
            <h3>Результат:</h3>
            <div class="result-value" id="resultValue"></div>
        </div>
    </div>

    <script src="convert.js"></script>
</body>
</html>
